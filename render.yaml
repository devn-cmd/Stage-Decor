services:
  - type: web
    name: stagedecor-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stagedecor-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://YOUR_FIREBASE_PROJECT_ID.web.app,https://YOUR_CUSTOM_DOMAIN.com

databases:
  - name: stagedecor-db
    databaseName: stagedecor
    user: stagedecor
    plan: free
    region: oregon
